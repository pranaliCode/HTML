<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>svg</title>
</head>
<body>
    <svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="150" cy="150" r="80" fill="#f4a261" stroke="#333" stroke-width="3"/>

  <!-- Ears -->
  <polygon points="95,95 120,40 145,95" fill="#f4a261" stroke="#333" stroke-width="3"/>
  <polygon points="155,95 180,40 205,95" fill="#f4a261" stroke="#333" stroke-width="3"/>

  <!-- Inner ears -->
  <polygon points="110,90 122,60 135,90" fill="#f7cad0"/>
  <polygon points="165,90 178,60 190,90" fill="#f7cad0"/>

  <!-- Eyes -->
  <ellipse cx="120" cy="140" rx="10" ry="15" fill="#222"/>
  <ellipse cx="180" cy="140" rx="10" ry="15" fill="#222"/>

  <!-- Nose -->
  <polygon points="150,165 140,180 160,180" fill="#e76f51"/>

  <!-- Mouth -->
  <path d="M150 180 Q140 195 130 195" stroke="#333" stroke-width="2" fill="none"/>
  <path d="M150 180 Q160 195 170 195" stroke="#333" stroke-width="2" fill="none"/>

  <!-- Whiskers -->
  <line x1="70" y1="170" x2="130" y2="165" stroke="#333" stroke-width="2"/>
  <line x1="70" y1="185" x2="130" y2="180" stroke="#333" stroke-width="2"/>
  <line x1="170" y1="165" x2="230" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="170" y1="180" x2="230" y2="185" stroke="#333" stroke-width="2"/>
</svg>
</body>
</html>
