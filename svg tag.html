<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEFA"/>
      <stop offset="100%" stop-color="#EAF9FF"/>
    </linearGradient>

    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8EE26B"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>

    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1000" height="700" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="850" cy="100" r="50" fill="#FFD54F"/>
  <g stroke="#FFD54F" stroke-width="4">
    <line x1="850" y1="20" x2="850" y2="0"/>
    <line x1="850" y1="200" x2="850" y2="180"/>
    <line x1="770" y1="100" x2="750" y2="100"/>
    <line x1="950" y1="100" x2="930" y2="100"/>
    <line x1="790" y1="40" x2="775" y2="25"/>
    <line x1="910" y1="160" x2="925" y2="175"/>
    <line x1="790" y1="160" x2="775" y2="175"/>
    <line x1="910" y1="40" x2="925" y2="25"/>
  </g>

  <!-- Clouds -->
  <g fill="white" opacity="0.9">
    <ellipse cx="180" cy="110" rx="50" ry="30"/>
    <ellipse cx="220" cy="100" rx="60" ry="35"/>
    <ellipse cx="270" cy="115" rx="45" ry="28"/>

    <ellipse cx="500" cy="90" rx="45" ry="28"/>
    <ellipse cx="545" cy="80" rx="55" ry="32"/>
    <ellipse cx="590" cy="95" rx="40" ry="25"/>
  </g>

  <!-- Grass -->
  <rect y="450" width="1000" height="250" fill="url(#grass)"/>

  <!-- Garden Path -->
  <path d="M420 700 Q500 560 540 450"
        fill="none"
        stroke="#D7C0A3"
        stroke-width="90"
        stroke-linecap="round"/>

  <!-- Mango Tree Trunk -->
  <path d="M230 450
           C220 370 225 290 245 220
           C260 170 290 130 320 100
           L360 100
           C340 150 335 230 345 320
           C350 380 365 420 380 450 Z"
        fill="url(#trunk)"/>

  <!-- Branches -->
  <g stroke="#6D4C41" stroke-width="18" fill="none" stroke-linecap="round">
    <path d="M290 220 C220 180 170 180 120 220"/>
    <path d="M320 200 C400 150 470 170 540 220"/>
    <path d="M310 280 C220 260 150 310 90 360"/>
    <path d="M340 280 C430 260 520 300 600 360"/>
  </g>

  <!-- Mango Tree Canopy -->
  <g>
    <circle cx="310" cy="150" r="110" fill="#2E8B57"/>
    <circle cx="210" cy="210" r="95" fill="#34A853"/>
    <circle cx="410" cy="210" r="95" fill="#34A853"/>
    <circle cx="170" cy="300" r="85" fill="#43B95A"/>
    <circle cx="450" cy="300" r="85" fill="#43B95A"/>
    <circle cx="310" cy="280" r="130" fill="#228B22"/>
  </g>

  <!-- Mangoes -->
  <g fill="#FFC107" stroke="#E69500" stroke-width="2">
    <ellipse cx="240" cy="180" rx="14" ry="22" transform="rotate(15 240 180)"/>
    <ellipse cx="360" cy="160" rx="14" ry="22" transform="rotate(-10 360 160)"/>
    <ellipse cx="190" cy="270" rx="14" ry="22" transform="rotate(20 190 270)"/>
    <ellipse cx="430" cy="260" rx="14" ry="22" transform="rotate(-15 430 260)"/>
    <ellipse cx="300" cy="320" rx="14" ry="22" transform="rotate(10 300 320)"/>
    <ellipse cx="500" cy="310" rx="14" ry="22" transform="rotate(-15 500 310)"/>
  </g>

  <!-- Flower Beds -->
  <g>
    <!-- Left flowers -->
    <g>
      <circle cx="650" cy="520" r="10" fill="#FF4081"/>
      <circle cx="640" cy="510" r="10" fill="#FF4081"/>
      <circle cx="660" cy="510" r="10" fill="#FF4081"/>
      <circle cx="650" cy="500" r="10" fill="#FF4081"/>
      <circle cx="650" cy="510" r="7" fill="#FFD54F"/>
      <line x1="650" y1="520" x2="650" y2="560" stroke="green" stroke-width="3"/>
    </g>

    <g>
      <circle cx="730" cy="560" r="10" fill="#9C27B0"/>
      <circle cx="720" cy="550" r="10" fill="#9C27B0"/>
      <circle cx="740" cy="550" r="10" fill="#9C27B0"/>
      <circle cx="730" cy="540" r="10" fill="#9C27B0"/>
      <circle cx="730" cy="550" r="7" fill="#FFD54F"/>
      <line x1="730" y1="560" x2="730" y2="600" stroke="green" stroke-width="3"/>
    </g>

    <g>
      <circle cx="820" cy="520" r="10" fill="#F44336"/>
      <circle cx="810" cy="510" r="10" fill="#F44336"/>
      <circle cx="830" cy="510" r="10" fill="#F44336"/>
      <circle cx="820" cy="500" r="10" fill="#F44336"/>
      <circle cx="820" cy="510" r="7" fill="#FFD54F"/>
      <line x1="820" y1="520" x2="820" y2="560" stroke="green" stroke-width="3"/>
    </g>
  </g>

  <!-- Bushes -->
  <g fill="#2E7D32">
    <circle cx="650" cy="620" r="40"/>
    <circle cx="700" cy="620" r="35"/>  
    <circle cx="760" cy="620" r="45"/>
    <circle cx="850" cy="620" r="40"/>
  </g>

  <!-- Garden Bench -->
  <g transform="translate(600 420)">
    <rect x="0" y="20" width="120" height="12" fill="#8D6E63"/>
    <rect x="0" y="0" width="120" height="12" fill="#8D6E63"/>
    <line x1="10" y1="32" x2="0" y2="70" stroke="#5D4037" stroke-width="5"/>
    <line x1="110" y1="32" x2="120" y2="70" stroke="#5D4037" stroke-width="5"/>
    <line x1="20" y1="12" x2="20" y2="70" stroke="#5D4037" stroke-width="5"/>
    <line x1="100" y1="12" x2="100" y2="70" stroke="#5D4037" stroke-width="5"/>
  </g>

  <!-- Birds -->
  <g stroke="#333" stroke-width="3" fill="none">
    <path d="M700 150 Q715 130 730 150"/>
    <path d="M730 150 Q745 130 760 150"/>

    <path d="M580 180 Q595 160 610 180"/>
    <path d="M610 180 Q625 160 640 180"/>
  </g>
</svg>
</body>
</html>
